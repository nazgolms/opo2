<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexusFX — Support Desk</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login-page" class="auth-page">
  <div class="auth-container">

    <div class="auth-card">
      <h2>Login</h2>

      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <a href="#" onclick="showPage('signup')">Sign up</a>
    </div>

  </div>
</div>

<!-- SIGNUP -->
<div id="signup-page" class="auth-page" style="display:none">
  <div class="auth-container">

    <div class="auth-card">
      <h2>Signup</h2>

      <input type="text" placeholder="Name">
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">

      <button onclick="showPage('login')">Create Account</button>
      <a href="#" onclick="showPage('login')">Back to login</a>
    </div>

  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-page" style="display:none">

  <!-- SIDEBAR -->
  <nav class="sidebar">

    <div class="nav-item active" onclick="navigate('dashboard')">Dashboard</div>
    <div class="nav-item" onclick="navigate('chat')">Live Chat</div>
    <div class="nav-item" onclick="navigate('tickets')">Tickets</div>
    <div class="nav-item" onclick="navigate('clients')">Clients</div>

  </nav>

  <!-- MAIN -->
  <div class="main-content">

    <header>
      <h2 id="page-title">Dashboard</h2>
    </header>

    <!-- PAGES -->

    <div class="page active" id="page-dashboard">
      <h3>Dashboard Home</h3>
      <p>Everything is working ✔</p>
    </div>

    <div class="page" id="page-chat">
      <h3>Live Chat</h3>
    </div>

    <div class="page" id="page-tickets">
      <h3>Tickets</h3>
    </div>

    <div class="page" id="page-clients">
      <h3>Clients</h3>
    </div>

  </div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
